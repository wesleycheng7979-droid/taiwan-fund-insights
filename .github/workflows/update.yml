name: Daily Fund Data Update

on:
  schedule:
    # 14:00 UTC is 22:00 (10:00 PM) Taipei Time (UTC+8)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run data scraper
      run: python update_data.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/funds.json
        # Only commit if there are changes
        if git diff --staged --quiet; then
          echo "No changes in fund data. Skipping commit."
        else
          git commit -m "Auto-update mutual fund data [skip ci]"
          git push
        fi
